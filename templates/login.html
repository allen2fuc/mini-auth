{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block head %}<link rel="stylesheet" href="/static/css/login.css">{% endblock %}

{% block body %}
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<div class="card">
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="brand-name">Auth</div>
  </div>

  <h1>欢迎回来</h1>
  <p class="subtitle">请输入您的账号信息</p>

  {% if error %}
  <div class="alert alert-error" role="alert">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login" id="loginForm" autocomplete="on">
    <input type="hidden" name="rd" value="{{ rd }}">
    <input type="hidden" name="captcha_id" id="captchaId" value="{{ captcha_id or '' }}">

    <div class="field">
      <label for="username">用户名</label>
      <div class="field-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <input id="username" name="username" type="text" placeholder="用户名" autocomplete="username" required autofocus>
    </div>

    <div class="field">
      <label for="password">密码</label>
      <div class="field-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <input id="password" name="password" type="password" placeholder="密码" autocomplete="current-password" required>
      <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Toggle password">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div class="field captcha-field{% if not captcha_required %} hidden{% endif %}" id="captchaField">
      <label for="captcha_code">验证码</label>
      <div class="captcha-row">
        <input id="captcha_code" name="captcha_code" type="text" placeholder="请输入验证码" autocomplete="off" maxlength="8"{% if captcha_required %} required{% endif %}>
        <img id="captchaImg" class="captcha-img" src="{% if captcha_id %}/login/captcha?cid={{ captcha_id }}{% endif %}" alt="验证码" title="点击刷新">
        <button type="button" class="captcha-refresh" id="captchaRefresh" aria-label="刷新验证码">刷新</button>
      </div>
    </div>

    <div class="form-options">
      <label class="remember-me">
        <input type="checkbox" name="remember" value="on">
        <span>记住我</span>
      </label>
    </div>

    <button type="submit" id="submitBtn">
      <span class="btn-text">登录</span>
      <div class="spinner"></div>
    </button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  window.LOGIN_CAPTCHA_REQUIRED = {{ 'true' if captcha_required else 'false' }};
</script>
<script src="/static/js/login.js"></script>
{% endblock %}
