{% extends "base.html" %}
{% block title %}修改密码{% endblock %}
{% block head %}<link rel="stylesheet" href="/static/css/login.css">{% endblock %}

{% block body %}
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<div class="card">
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="brand-name">Auth</div>
  </div>

  <h1>修改密码</h1>
  <p class="subtitle">账号 {{ username }}</p>

  {% if error %}
  <div class="alert alert-error" role="alert">{{ error }}</div>
  {% endif %}

  <form method="post" action="/change-password" id="changePasswordForm" autocomplete="off">
    <input type="hidden" name="rd" value="{{ rd }}">

    <div class="field">
      <label for="old_password">当前密码</label>
      <div class="field-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <input id="old_password" name="old_password" type="password" placeholder="当前密码" autocomplete="current-password" required autofocus>
      <button type="button" class="toggle-password" data-target="old_password" aria-label="显示密码">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div class="field">
      <label for="new_password">新密码</label>
      <div class="field-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <input id="new_password" name="new_password" type="password" placeholder="至少 4 位" autocomplete="new-password" minlength="4" maxlength="128" required>
      <button type="button" class="toggle-password" data-target="new_password" aria-label="显示密码">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div class="field">
      <label for="confirm_password">确认新密码</label>
      <div class="field-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <input id="confirm_password" name="confirm_password" type="password" placeholder="再次输入新密码" autocomplete="new-password" minlength="4" maxlength="128" required>
      <button type="button" class="toggle-password" data-target="confirm_password" aria-label="显示密码">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <button type="submit" id="submitBtn">
      <span class="btn-text">保存密码</span>
      <div class="spinner"></div>
    </button>
  </form>

  <p class="form-footer-link">
    {% if is_admin %}
    <a href="/admin/">返回管理后台</a>
    {% else %}
    <a href="{{ rd }}">返回</a>
    {% endif %}
  </p>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/change_password.js"></script>
{% endblock %}
