version: "3.8"

# docker network create traefik
# mkdir -p ./traefik/logs ./traefik/dynamic ./traefik/config
# mkdir -p ./mini-auth/logs ./mini-auth/data ./redis/data

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/config/traefik.yml:/etc/traefik/traefik.yml
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/logs:/var/log/traefik
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    networks:
      - proxy

  whoami:
    image: traefik/whoami
    container_name: whoami
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    networks:
      - proxy

  miniauth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miniauth
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./logs:/app/logs
      - ./auth.db:/app/data/auth.db
    environment:
      - AUTH_PUBLIC_URL=http://auth.example.com
      - COOKIE_DOMAIN=example.com
      # Traefik 当前仅暴露 :80 (HTTP)；Secure Cookie 在 HTTP 下不会被浏览器保存
      - COOKIE_SECURE=false
      - DB_URL=sqlite+aiosqlite:///./data/auth.db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - proxy

  redis:
    image: redis:8
    container_name: redis
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./redis/data:/data
    command: ["redis-server", "--save", "60", "1"]
    networks:
      - proxy

networks:
  proxy:
    external: true